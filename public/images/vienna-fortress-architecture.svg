  <text x="466" y="726" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">Requests enter through private or reverse-proxied paths, services are monitored continuously, and virtualization state is pulled into the dashboard through a stabilized Proxmox API integration.</text>

